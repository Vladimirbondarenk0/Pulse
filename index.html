<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link rel="stylesheet" href="css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="css/style.min.css">
</head>

<body>
    <div class="promo">
        <div class="container">
            <header class="header">
                <a href="#" class="header__logo">
                    <img src="icons/running-man.png" alt="logo">
                </a>
                <div class="header__ofitial">
                    Официальный представитель
                    <span>Garmin, Polar, Suunto</span>
                </div>
                <div class="header__contact">
                    <a href="tel:+380969081242" class="header__phone">+38(096) 908-12-42</a>
                    <button class="button">заказать звонок</button>
                </div>
            </header>

            <div class="promo__wrapper">
                <h1 class="promo__header">Подбор пульсометра</h1>
                <h2 class="promo__subheader">с учётом Вашего уровня подготовк</h2>

                <div class="promo__icons">
                    <div class="promo__icon">
                        <img src="icons/timer_time.png" alt="timer">
                        <div class="descr">Время подбора: <br> 10 минут</div>
                    </div>
                    <div class="promo__icon">
                        <img src="icons/hand-cart.png" alt="hand-cart">
                        <div class="descr">Бесплатная <br> доставка</div>
                    </div>
                    <div class="promo__icon">
                        <img src="icons/messages.png" alt="messages">
                        <div class="descr">Ответим <br> на все вопросы</div>
                    </div>
                </div>

                <button class="button button_main">заказать кОНСУЛЬТАЦИЮ</button>
                <div class="promo__link">
                    или
                    <a href="#">ПЕРЕЙТИ В КАТАЛОГ</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
